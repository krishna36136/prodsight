# ===============================
# Application
# ===============================
spring.application.name=Incident_Service
server.port=8082


# ===============================
# Kafka Consumer Configuration
# ===============================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=incident-group
spring.kafka.consumer.auto-offset-reset=earliest

# Key Deserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Value Deserializer (with proper error handling)
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# IMPORTANT: Ignore producer-side __TypeId__ headers
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Map JSON to this service's DTO
spring.kafka.consumer.properties.spring.json.value.default.type=com.krishna.Incident_Service.model.MetricEvent

# Trust packages for JSON deserialization
spring.kafka.consumer.properties.spring.json.trusted.packages=*


# ===============================
# Database Configuration (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3307/prodsight
spring.datasource.username=prodsight
spring.datasource.password=prodsight
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect